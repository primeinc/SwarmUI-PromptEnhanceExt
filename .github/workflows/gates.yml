name: gates

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run check:frontend-parity
      - run: npm run test:frontend

  csharp:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mcmonkeyprojects/SwarmUI
          ref: 9c81c1cbcb5f256508e186fd3b4faa873c139b7d
          path: SwarmUI
      - uses: actions/checkout@v4
        with:
          path: SwarmUI/src/Extensions/PromptEnhance
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build SwarmUI/src/SwarmUI.csproj -c Release -o SwarmUI/src/bin/live_release
      - run: dotnet test SwarmUI/src/Extensions/PromptEnhance/Tests/PromptEnhance.Tests.csproj -c Debug

  csharp-vendored:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mcmonkeyprojects/SwarmUI
          ref: 9c81c1cbcb5f256508e186fd3b4faa873c139b7d
          path: vendor/SwarmUI
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test Tests/PromptEnhance.Tests.csproj -c Debug
